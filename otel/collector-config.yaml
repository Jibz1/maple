# OpenTelemetry Collector Configuration
# Configured for internal OTLP ingest forwarding to Tinybird
# The Prometheus scrape jobs are generated by otel/generate-prometheus-scrape-config.ts.

receivers:
    otlp:
        protocols:
            grpc:
                endpoint: 0.0.0.0:4317
            http:
                endpoint: 0.0.0.0:4318

    prometheus:
        config:
            scrape_configs:
                - job_name: "maple-managed-scrape-5s"
                  scrape_interval: 5s
                  scrape_timeout: 4s
                  authorization:
                      credentials: "${env:SD_INTERNAL_TOKEN}"
                  http_sd_configs:
                      - url: "http://${env:SD_API_HOST}:${env:SD_API_PORT}/api/internal/sd/prometheus?interval=5"
                        authorization:
                            credentials: "${env:SD_INTERNAL_TOKEN}"
                        refresh_interval: 30s
                - job_name: "maple-managed-scrape-6s"
